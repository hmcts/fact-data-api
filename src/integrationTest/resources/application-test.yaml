spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:16:///fact
  cloud:
    azure:
      storage:
        # allows blob store autoconfigure to complete without exception
        account-name: test
      active-directory:
        app-id-uri: test
  autoconfigure:
    exclude:
      - com.azure.spring.cloud.autoconfigure.implementation.context.AzureTokenCredentialAutoConfiguration

user:
  retention-period: 365

courtLock:
  timeout-minutes: 60

os:
  url: https://api.os.uk
  key: a-key

migration:
  source-base-url: ${FACT_MIGRATION_SOURCE_BASE_URL:http://localhost:8080}

# fact-data-api internal configuration
fact:
  data-api:
    audit:
      retention-days: 0
